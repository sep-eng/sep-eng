<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>RECeIPT</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0; height: 100%;
      background: #05060a;
      overflow: hidden;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial, sans-serif;
    }
    canvas { display:block; width:100vw; height:100vh; }

    .ui { position: fixed; inset: 0; pointer-events: none; }
    .topbar {
      position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(10,12,18,0.55);
      border: 1px solid rgba(255,255,255,0.10);
      backdrop-filter: blur(10px);
      color: rgba(245,245,255,0.92);
      font-weight: 850;
      letter-spacing: 0.2px;
      box-shadow: 0 14px 60px rgba(0,0,0,0.35);
      text-shadow: 0 2px 16px rgba(0,0,0,0.55);
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
      font-size: 14px;
    }
    .controls {
      position: absolute; left: 12px; right: 12px; bottom: 12px;
      display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
      pointer-events: auto;
      user-select: none;
    }
    .btn {
      width: 54px; height: 54px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      color: rgba(245,245,255,0.92);
      font-weight: 950;
      font-size: 16px;
      box-shadow: 0 14px 60px rgba(0,0,0,0.35);
      backdrop-filter: blur(10px);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 0.3px;
    }
    .btn:active { transform: translateY(1px); }
    .btn[disabled] { opacity: 0.35; cursor: default; }

    .overlay {
      position: fixed; inset: 0;
      display: none;
      align-items: center; justify-content: center;
      padding: 22px;
      background: rgba(0,0,0,0.42);
      backdrop-filter: blur(10px);
      pointer-events: auto;
    }
    .card {
      width: min(780px, 92vw);
      background: rgba(9,10,16,0.86);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 18px;
      padding: 18px 18px 16px;
      box-shadow: 0 20px 90px rgba(0,0,0,0.55);
      color: rgba(245,245,255,0.92);
    }
    .card h1 { margin: 0 0 10px; font-size: 22px; }
    .card p { margin: 0 0 10px; line-height: 1.45; opacity: 0.88; }
    .row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
    .pill {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 10px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.06);
      font-weight: 800; font-size: 13px; opacity: 0.92;
    }
    .ok { color: rgba(170,255,200,0.95); }
    .warn { color: rgba(255,220,140,0.95); }
    .bad { color: rgba(255,130,150,0.95); }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="ui">
    <div class="topbar" id="topbar">Loading…</div>
    <div class="controls" id="controls"></div>
  </div>

  <div class="overlay" id="overlay">
    <div class="card" id="card"></div>
  </div>

<script>
(() => {
  // ---------- Canvas ----------
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', { alpha: false });

  function resize() {
    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    canvas.width = Math.floor(innerWidth * dpr);
    canvas.height = Math.floor(innerHeight * dpr);
    canvas.style.width = innerWidth + 'px';
    canvas.style.height = innerHeight + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  addEventListener('resize', resize, { passive: true });
  resize();

  // ---------- UI ----------
  const topbar = document.getElementById('topbar');
  const controls = document.getElementById('controls');
  const overlay = document.getElementById('overlay');
  const card = document.getElementById('card');

  function showOverlay(html) { card.innerHTML = html; overlay.style.display = 'flex'; }
  function hideOverlay() { overlay.style.display = 'none'; }

  // ---------- Helpers ----------
  const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
  const rand = (a,b) => a + Math.random() * (b - a);

  // ---------- Tasks ----------
  const TASK = {
    SCAN:    { id:'SCAN',    key:'s', label:'Scan' },
    WEIGH:   { id:'WEIGH',   key:'w', label:'Weigh' },
    BAG:     { id:'BAG',     key:'b', label:'Bag' },
    ID:      { id:'ID',      key:'i', label:'ID' },
    DISC:    { id:'DISC',    key:'d', label:'Discount' },
    REJECT:  { id:'REJECT',  key:'r', label:'Reject' },

    TAKE:    { id:'TAKE',    key:'t', label:'Take' },
    WRAP:    { id:'WRAP',    key:'a', label:'Wrap' },
    PREPARE: { id:'PREPARE', key:'e', label:'Prepare' },
    FINE:    { id:'FINE',    key:'f', label:'Fine' },
    UNWRAP:  { id:'UNWRAP',  key:'u', label:'Unwrap' },
    HEAT:    { id:'HEAT',    key:'h', label:'Heat up' },
    OPEN:    { id:'OPEN',    key:'o', label:'Open' },
  };

  const BASE_UNLOCK = ['SCAN','WEIGH','BAG','ID','DISC','REJECT']; // 1 per level from L1
  const EXTRA_UNLOCK = ['TAKE','WRAP','PREPARE','FINE','UNWRAP','HEAT','OPEN']; // once at 7 tasks, +1 each 3 levels

  function unlockedTaskIds(level) {
    const baseCount = clamp(level, 1, BASE_UNLOCK.length);
    const out = BASE_UNLOCK.slice(0, baseCount);

    // Once you have 7 tasks total -> start adding 1 every 3 levels.
    // We reach 7 tasks at level 7 (6 base + 1 extra).
    if (level >= 7) {
      const extraCount = 1 + Math.floor((level - 7) / 3);
      out.push(...EXTRA_UNLOCK.slice(0, clamp(extraCount, 0, EXTRA_UNLOCK.length)));
    }
    // De-dupe just in case
    return [...new Set(out)];
  }

  const KEY_TO_TASK = (() => {
    const map = {};
    Object.values(TASK).forEach(t => map[t.key] = t.id);
    return map;
  })();

  // ---------- Products (PNG assets) ----------
  // Level 1: Apple, Cereal, Butter, Beer.
  // Then add 1 product per level until all are included.
  const PRODUCT_ORDER = [
    'Apple','Cereal','Butter','Beer',
    'Bread','Milk','Water','Cheese','Honey',
    'Peanut Butter','Coffee','Flour','Sugar','Energy','Wine'
  ];

  const PRODUCT_DEF = {
    'Apple':         { img:'receipt_run_assets/apple.png',          baseH: 52,  wMul: 1.00, bias:{ WEIGH:4, SCAN:3, PREPARE:2 } },
    'Cereal':        { img:'receipt_run_assets/cereal.png',         baseH: 82,  wMul: 0.62, bias:{ SCAN:3, BAG:2, OPEN:2 } },
    'Butter':        { img:'receipt_run_assets/butter.png',         baseH: 46,  wMul: 2.15, bias:{ SCAN:2, WRAP:3, UNWRAP:2, HEAT:2 } },
    'Beer':          { img:'receipt_run_assets/beer.png',           baseH: 96,  wMul: 0.55, bias:{ ID:4, OPEN:3, SCAN:2 } },

    'Bread':         { img:'receipt_run_assets/bread.png',          baseH: 118, wMul: 0.62, bias:{ BAG:3, WRAP:2, SCAN:2 } },
    'Milk':          { img:'receipt_run_assets/milk.png',           baseH: 112, wMul: 0.55, bias:{ SCAN:2, BAG:2, HEAT:2 } },
    'Water':         { img:'receipt_run_assets/water.png',          baseH: 112, wMul: 0.52, bias:{ SCAN:2, OPEN:2 } },
    'Cheese':        { img:'receipt_run_assets/cheese.png',         baseH: 92,  wMul: 0.62, bias:{ WRAP:3, UNWRAP:2, SCAN:2 } },
    'Honey':         { img:'receipt_run_assets/honey.png',          baseH: 112, wMul: 0.56, bias:{ OPEN:2, SCAN:2 } },

    'Peanut Butter': { img:'receipt_run_assets/peanut_butter.png',  baseH: 112, wMul: 0.60, bias:{ OPEN:2, SCAN:2 } },
    'Coffee':        { img:'receipt_run_assets/coffee.png',         baseH: 118, wMul: 0.62, bias:{ SCAN:3, BAG:2 } },
    'Flour':         { img:'receipt_run_assets/flour.png',          baseH: 118, wMul: 0.60, bias:{ WEIGH:3, SCAN:2 } },
    'Sugar':         { img:'receipt_run_assets/sugar.png',          baseH: 118, wMul: 0.62, bias:{ WEIGH:3, SCAN:2 } },
    'Energy':        { img:'receipt_run_assets/energy.png',         baseH: 102, wMul: 0.50, bias:{ ID:2, OPEN:2, SCAN:2 } },
    'Wine':          { img:'receipt_run_assets/wine.png',           baseH: 124, wMul: 0.42, bias:{ ID:5, OPEN:2, SCAN:2 } },
  };

  const images = {};
  function loadImages() {
    const names = Object.keys(PRODUCT_DEF);
    let loaded = 0;

    return Promise.all(names.map(name => new Promise(resolve => {
      const img = new Image();
      img.onload = () => { loaded++; images[name] = img; resolve(); };
      img.onerror = () => { loaded++; images[name] = null; resolve(); };
      img.src = PRODUCT_DEF[name].img;
    })));
  }

  function enabledProducts(level) {
    const count = clamp(level + 3, 4, PRODUCT_ORDER.length); // L1 -> 4, L2 -> 5, ...
    return PRODUCT_ORDER.slice(0, count);
  }

  // ---------- Layout ----------
  function layout(cfg) {
    const w = innerWidth, h = innerHeight;

    const beltY = Math.floor(h * 0.64);
    const beltH = Math.max(150, Math.floor(h * 0.20));

    const gateX = Math.floor(w * 0.72);
    const clueX = Math.floor(w * 0.36);

    const gateW = cfg.gateW;

    return { w, h, beltY, beltH, gateX, gateW, clueX };
  }

  // ---------- Belt texture (moving tread) ----------
  const beltTex = document.createElement('canvas');
  beltTex.width = 280;
  beltTex.height = 120;
  const btx = beltTex.getContext('2d');

  function buildBeltTexture() {
    btx.clearRect(0,0,beltTex.width,beltTex.height);

    // base rubber
    const g = btx.createLinearGradient(0,0,0,beltTex.height);
    g.addColorStop(0, 'rgba(255,255,255,0.08)');
    g.addColorStop(0.5, 'rgba(255,255,255,0.02)');
    g.addColorStop(1, 'rgba(0,0,0,0.08)');
    btx.fillStyle = 'rgba(16,18,26,1)';
    btx.fillRect(0,0,beltTex.width,beltTex.height);
    btx.fillStyle = g;
    btx.fillRect(0,0,beltTex.width,beltTex.height);

    // treads
    btx.globalAlpha = 0.9;
    for (let i = -60; i < beltTex.width + 60; i += 22) {
      btx.save();
      btx.translate(i, beltTex.height/2);
      btx.rotate(-0.55);
      btx.fillStyle = 'rgba(255,255,255,0.05)';
      btx.fillRect(-8, -80, 10, 160);
      btx.restore();
    }
    btx.globalAlpha = 1;

    // tiny noise dots
    btx.globalAlpha = 0.18;
    for (let i=0;i<600;i++){
      btx.fillStyle = `rgba(255,255,255,${Math.random()*0.06})`;
      btx.fillRect(Math.random()*beltTex.width, Math.random()*beltTex.height, 1, 1);
    }
    btx.globalAlpha = 1;
  }
  buildBeltTexture();

  // ---------- Game config ----------
  function levelConfig(level) {
    const L = clamp(level, 1, 100);

    // Faster belt every level
    const beltSpeed = 175 + (L - 1) * 7.0;  // ~868 at level 100

    // Clue gets quicker every level
    const clueWindow = clamp(1.55 - (L - 1) * 0.012, 0.35, 1.55);

    // Gate gets a touch tighter later
    const gateW = clamp(86 - (L - 1) * 0.35, 50, 86);

    // Belt capacity
    const maxOnBelt = (L < 10) ? 2 : 3;

    // Items per level
    const goal = clamp(6 + Math.floor(L * 0.25), 6, 30);

    return { beltSpeed, clueWindow, gateW, maxOnBelt, goal };
  }

  // ---------- Game state ----------
  let state = 'loading'; // loading | menu | running | levelup | over | win
  let tPrev = 0;

  let level = 1;
  let score = 0;
  let streak = 0;
  let mult = 1.0;
  let lives = 6;
  const LIVES_MAX = 6;

  let cfg = levelConfig(level);
  let goal = cfg.goal;
  let cleared = 0;

  const world = {
    time: 0,
    items: [],
  };

  let nextId = 1;

  // ---------- Toast ----------
  let toast = { t: 0, text: '', kind: 'muted' };
  function flash(text, kind='muted') { toast.t = 0.95; toast.text = text; toast.kind = kind; }

  function reward(points, msg) {
    score += points;
    streak += 1;
    mult = clamp(1.0 + streak * 0.06, 1, 4.0);
    flash(msg, 'ok');
  }
  function punish(msg) {
    lives -= 1;
    streak = 0;
    mult = 1.0;
    flash(msg, 'bad');
    if (lives <= 0) gameOver();
  }

  // ---------- UI Controls ----------
  function rebuildButtons() {
    controls.innerHTML = '';
    const taskIds = unlockedTaskIds(level);

    // Buttons show ONLY the letter key (clean UI).
    // Click/tap still works.
    for (const id of taskIds) {
      const t = TASK[id];
      if (!t) continue;
      const btn = document.createElement('button');
      btn.className = 'btn';
      btn.textContent = t.key.toUpperCase();
      btn.title = t.label; // hidden unless hover (desktop)
      btn.addEventListener('click', (e) => { e.preventDefault(); doAction(id); }, { passive:false });
      btn.addEventListener('pointerdown', (e) => { e.preventDefault(); doAction(id); }, { passive:false });
      controls.appendChild(btn);
    }
  }

  addEventListener('keydown', (e) => {
    const k = (e.key || '').toLowerCase();

    if (k === 'enter' && (state === 'menu' || state === 'over' || state === 'levelup' || state === 'win')) {
      e.preventDefault();
      startOrContinue();
      return;
    }

    const id = KEY_TO_TASK[k];
    if (id) { e.preventDefault(); doAction(id); }
  });

  addEventListener('pointerdown', () => {
    if (state === 'menu' || state === 'over' || state === 'levelup' || state === 'win') startOrContinue();
  }, { passive:true });

  // ---------- Items ----------
  function pickProductName() {
    const allowed = enabledProducts(level);
    return allowed[Math.floor(Math.random() * allowed.length)];
  }

  function pickTaskForProduct(productName) {
    const unlocked = unlockedTaskIds(level);

    // Unlimited: any unlocked task can happen on any product.
    // But we bias per product so it feels "right", without restricting.
    const bias = (PRODUCT_DEF[productName] && PRODUCT_DEF[productName].bias) ? PRODUCT_DEF[productName].bias : {};

    // weight list
    let total = 0;
    const weights = unlocked.map(id => {
      const w = (bias[id] ?? 1);
      total += w;
      return w;
    });

    let r = Math.random() * total;
    for (let i=0;i<unlocked.length;i++){
      r -= weights[i];
      if (r <= 0) return unlocked[i];
    }
    return unlocked[0];
  }

  function makeItem(spawnX) {
    const name = pickProductName();
    const def = PRODUCT_DEF[name];

    const taskId = pickTaskForProduct(name);
    const taskLabel = TASK[taskId]?.label || taskId;

    // Base size scaling (apple small, bread big, etc.)
    const baseH = def?.baseH ?? 90;
    const h = baseH;

    // compute width from image aspect if loaded; fallback wMul
    const img = images[name];
    let w;
    if (img && img.width && img.height) w = h * (img.width / img.height);
    else w = h * (def?.wMul ?? 0.6);

    return {
      id: nextId++,
      name,
      taskId,
      taskLabel,

      x: spawnX,
      yBob: rand(-6, 6),
      wiggle: rand(0, Math.PI*2),

      w,
      h,

      clueShown: false,
      clueT: 0,

      removed: false,
      passedGate: false
    };
  }

  function computeMinSpacing(L, enabledList) {
    // hard rule: never allow two items to be in the gate at once
    let maxW = 140;
    for (const n of enabledList) {
      const def = PRODUCT_DEF[n];
      const img = images[n];
      const h = def?.baseH ?? 90;
      const w = img && img.width ? (h * (img.width / img.height)) : (h * (def?.wMul ?? 0.6));
      maxW = Math.max(maxW, w);
    }
    return (L.gateW * 2) + maxW + 170; // big enough so only one can sit in the action zone
  }

  function seedBelt() {
    world.items.length = 0;

    const L = layout(cfg);
    const enabledList = enabledProducts(level);
    const minSpacing = computeMinSpacing(L, enabledList);

    // spawn 1 or 2 depending on level
    const spawnX = -260;
    world.items.push(makeItem(spawnX));
    if (cfg.maxOnBelt >= 2) world.items.push(makeItem(spawnX - minSpacing));
  }

  function focusItem(L) {
    // closest item before the gate (your "focus")
    let best = null;
    let bestX = -Infinity;
    for (const it of world.items) {
      if (it.removed) continue;
      if (it.x > L.gateX + 30) continue;
      if (it.x > bestX) { bestX = it.x; best = it; }
    }
    return best;
  }

  function inGate(it, L) {
    return it && Math.abs(it.x - L.gateX) <= L.gateW;
  }

  // ---------- Actions ----------
  function doAction(taskId) {
    if (state !== 'running') return;

    const L = layout(cfg);
    const it = focusItem(L);
    if (!it) { flash('No item', 'warn'); return; }

    // Must be inside the ONE action zone
    if (!inGate(it, L)) { punish('Timing'); return; }

    // Correct?
    if (it.taskId !== taskId) { punish('Wrong'); it.removed = true; return; }

    // Success
    it.removed = true;
    const base = 60 + Math.floor(rand(0, 35));
    reward(Math.floor(base * mult), '✔');
    cleared += 1;

    if (cleared >= goal) {
      if (level >= 100) winGame();
      else levelUp();
    }
  }

  // ---------- Flow ----------
  function showMenu() {
    state = 'menu';
    showOverlay(`
      <h1>Receipt Run</h1>
      <p>One blue action zone does everything.</p>
      <p class="muted">Hints are popup-only. Click/tap/Enter to start.</p>
      <div class="row">
        <div class="pill ok">Start: click / tap / Enter</div>
        <div class="pill warn">Keys: S W B I D R T A E F U H O</div>
      </div>
    `);
  }

  function startOrContinue() {
    if (state === 'menu') startGame();
    else if (state === 'over') restartGame();
    else if (state === 'levelup') beginLevel(false);
    else if (state === 'win') restartGame();
  }

  function startGame() {
    level = 1;
    score = 0;
    streak = 0;
    mult = 1.0;
    lives = LIVES_MAX;
    nextId = 1;
    beginLevel(true);
  }

  function restartGame() {
    hideOverlay();
    startGame();
  }

  function beginLevel(isNewGame) {
    cfg = levelConfig(level);
    goal = cfg.goal;
    cleared = 0;

    if (!isNewGame) lives = Math.min(LIVES_MAX, lives + 1);

    rebuildButtons();
    world.time = 0;
    seedBelt();
    toast.t = 0;
    toast.text = '';
    hideOverlay();
    state = 'running';
  }

  function levelUp() {
    state = 'levelup';
    world.items.length = 0;

    const next = level + 1;
    const nextCfg = levelConfig(next);

    showOverlay(`
      <h1>Level ${level} cleared</h1>
      <p><b>Score:</b> ${Math.floor(score)} · <b>Lives:</b> ${lives} (next level +1, max ${LIVES_MAX})</p>
      <p class="muted">Belt gets faster and hints get quicker every level.</p>
      <div class="row">
        <div class="pill ok">Continue: click / tap / Enter</div>
        <div class="pill warn">Next speed: ${nextCfg.beltSpeed.toFixed(0)} · hint: ${nextCfg.clueWindow.toFixed(2)}s</div>
      </div>
    `);

    level += 1;
  }

  function gameOver() {
    state = 'over';
    showOverlay(`
      <h1>Shift ended</h1>
      <p>
        <b>Level:</b> ${level}<br>
        <b>Score:</b> ${Math.floor(score)}<br>
        <b>Streak:</b> ${streak}<br>
        <b>Multiplier:</b> x${mult.toFixed(1)}
      </p>
      <p class="muted">Click/tap/Enter to restart.</p>
      <div class="row">
        <div class="pill ok">Restart: click / tap / Enter</div>
      </div>
    `);
  }

  function winGame() {
    state = 'win';
    showOverlay(`
      <h1>100 levels cleared</h1>
      <p><b>Score:</b> ${Math.floor(score)} · <b>Lives:</b> ${lives}</p>
      <p class="muted">Click/tap/Enter to run it back.</p>
      <div class="row">
        <div class="pill ok">Restart: click / tap / Enter</div>
      </div>
    `);
  }

  // ---------- Update ----------
  function update(dt) {
    const L = layout(cfg);
    world.time += dt;

    // spacing guarantee (no 2 items inside the action zone)
    const enabledList = enabledProducts(level);
    const minSpacing = computeMinSpacing(L, enabledList);

    for (const it of world.items) {
      if (it.removed) continue;
      it.wiggle += dt * 1.6;
      it.x += cfg.beltSpeed * dt;

      // popup clue only (brief)
      if (!it.clueShown && it.x >= L.clueX) {
        it.clueShown = true;
        it.clueT = cfg.clueWindow;
      }
      if (it.clueT > 0) it.clueT -= dt;

      // missed gate
      if (!it.passedGate && it.x > L.gateX + L.gateW + 30) {
        it.passedGate = true;
        if (!it.removed) {
          punish('Missed');
          it.removed = true;
        }
      }
    }

    // Keep a hard minimum distance between consecutive items (prevents overlaps / double-in-zone glitches)
    world.items.sort((a,b) => a.x - b.x);
    for (let i=1;i<world.items.length;i++){
      const a = world.items[i-1];
      const b = world.items[i];
      if (a.removed || b.removed) continue;
      const minDist = (a.w/2 + b.w/2) + (minSpacing - 220); // strong but still lets 2-3 on belt
      if ((b.x - a.x) < minDist) b.x = a.x + minDist;
    }

    // Cleanup
    world.items = world.items.filter(it => !it.removed && it.x < L.w + 280);

    // Spawn
    while (world.items.length < cfg.maxOnBelt) {
      const spawnX = -320;
      const last = world.items.reduce((m, it) => (!m || it.x < m.x) ? it : m, null); // leftmost
      const newIt = makeItem(spawnX);

      // Make sure new spawn doesn't collide immediately
      if (!last) {
        world.items.unshift(newIt);
        continue;
      }
      const gap = (last.x - spawnX);
      if (gap < minSpacing) break;
      world.items.unshift(newIt);
    }

    if (toast.t > 0) toast.t -= dt;
  }

  // ---------- Draw ----------
  function roundRect(x, y, w, h, r, fill, stroke) {
    r = Math.min(r, w/2, h/2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
    if (fill) ctx.fill();
    if (stroke) ctx.stroke();
  }

  function drawBackground(L) {
    // Nice, simple "store/warehouse" vibe (no external image needed)
    ctx.fillStyle = '#05060a';
    ctx.fillRect(0,0,L.w,L.h);

    const g = ctx.createLinearGradient(0, 0, 0, L.h);
    g.addColorStop(0, '#070915');
    g.addColorStop(0.55, '#04050c');
    g.addColorStop(1, '#02030a');
    ctx.fillStyle = g;
    ctx.fillRect(0,0,L.w,L.h);

    // soft lights
    ctx.globalAlpha = 0.28;
    for (let i=0;i<5;i++){
      const x = (i+0.5) * (L.w/5);
      const y = L.h*0.22 + Math.sin(world.time*0.6 + i)*10;
      const rg = ctx.createRadialGradient(x,y, 10, x,y, L.w*0.22);
      rg.addColorStop(0, 'rgba(170,220,255,0.20)');
      rg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = rg;
      ctx.fillRect(0,0,L.w,L.h);
    }
    ctx.globalAlpha = 1;

    // vignette
    const vg = ctx.createRadialGradient(L.w/2, L.h/2, L.h*0.2, L.w/2, L.h/2, L.h*0.85);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(0,0,0,0.55)');
    ctx.fillStyle = vg;
    ctx.fillRect(0,0,L.w,L.h);
  }

  function drawBelt(L) {
    const beltTop = L.beltY - L.beltH/2;
    const beltX = 16;
    const beltW = L.w - 32;

    // outer frame
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    roundRect(beltX, beltTop, beltW, L.beltH, 22, true, false);

    // inner belt
    const innerPad = 10;
    const innerX = beltX + innerPad;
    const innerY = beltTop + innerPad;
    const innerW = beltW - innerPad*2;
    const innerH = L.beltH - innerPad*2;

    // base shading
    const g = ctx.createLinearGradient(0, innerY, 0, innerY + innerH);
    g.addColorStop(0, 'rgba(255,255,255,0.06)');
    g.addColorStop(0.5, 'rgba(255,255,255,0.02)');
    g.addColorStop(1, 'rgba(0,0,0,0.10)');
    ctx.fillStyle = 'rgba(12,14,20,1)';
    roundRect(innerX, innerY, innerW, innerH, 18, true, false);
    ctx.fillStyle = g;
    roundRect(innerX, innerY, innerW, innerH, 18, true, false);

    // moving tread texture
    ctx.save();
    ctx.beginPath();
    roundRect(innerX, innerY, innerW, innerH, 18, false, false);
    ctx.clip();

    const pattern = ctx.createPattern(beltTex, 'repeat');
    ctx.fillStyle = pattern;

    // scroll offset uses world.time and beltSpeed
    const scroll = -(world.time * cfg.beltSpeed * 0.7) % beltTex.width;
    ctx.translate(scroll, 0);
    ctx.fillRect(innerX - scroll, innerY, innerW + beltTex.width, innerH);
    ctx.restore();

    // rollers
    const r = innerH*0.52;
    const ry = innerY + innerH/2;

    function roller(cx){
      const rg = ctx.createRadialGradient(cx, ry, 6, cx, ry, r);
      rg.addColorStop(0, 'rgba(255,255,255,0.30)');
      rg.addColorStop(0.35, 'rgba(255,255,255,0.10)');
      rg.addColorStop(1, 'rgba(0,0,0,0.35)');
      ctx.fillStyle = rg;
      ctx.beginPath();
      ctx.ellipse(cx, ry, r, r*0.78, 0, 0, Math.PI*2);
      ctx.fill();

      ctx.strokeStyle = 'rgba(255,255,255,0.10)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(cx, ry, r, r*0.78, 0, 0, Math.PI*2);
      ctx.stroke();
    }
    roller(innerX + 28);
    roller(innerX + innerW - 28);
  }

  function drawGate(L) {
    const beltTop = L.beltY - L.beltH/2;
    // ONE action zone (blue)
    ctx.fillStyle = 'rgba(120,200,255,0.12)';
    roundRect(L.gateX - L.gateW, beltTop - 14, L.gateW*2, L.beltH + 28, 14, true, false);

    ctx.strokeStyle = 'rgba(170,220,255,0.30)';
    ctx.lineWidth = 2;
    roundRect(L.gateX - L.gateW, beltTop - 14, L.gateW*2, L.beltH + 28, 14, false, true);

    // clue marker line (subtle)
    ctx.strokeStyle = 'rgba(255,255,255,0.10)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(L.clueX, beltTop - 18);
    ctx.lineTo(L.clueX, beltTop + L.beltH + 18);
    ctx.stroke();
  }

  function drawClue(x, y, text, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha * 0.95;
    ctx.font = '950 12px system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial';
    ctx.textAlign = 'center';

    const w = ctx.measureText(text).width + 18;
    const h = 22;

    ctx.fillStyle = 'rgba(10,12,18,0.70)';
    roundRect(x - w/2, y - h, w, h, 999, true, false);

    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 1;
    roundRect(x - w/2, y - h, w, h, 999, false, true);

    ctx.fillStyle = 'rgba(210,235,255,0.92)';
    ctx.fillText(text, x, y - 7);
    ctx.restore();
  }

  function drawItems(L) {
    const beltTop = L.beltY - L.beltH/2;
    const beltBottom = L.beltY + L.beltH/2;

    const focus = focusItem(L);
    const focusId = focus ? focus.id : null;

    for (const it of world.items) {
      const y = L.beltY + it.yBob + Math.sin(it.wiggle)*3;
      const x = it.x;

      // shadow
      ctx.fillStyle = 'rgba(0,0,0,0.38)';
      ctx.beginPath();
      ctx.ellipse(x, y + it.h*0.35, it.w*0.34, it.h*0.16, 0, 0, Math.PI*2);
      ctx.fill();

      // image
      const img = images[it.name];
      if (img) {
        const drawW = it.w;
        const drawH = it.h;
        ctx.drawImage(img, x - drawW/2, y - drawH/2, drawW, drawH);
      } else {
        // fallback (shouldn’t happen if assets are present)
        ctx.fillStyle = 'rgba(255,255,255,0.08)';
        roundRect(x - it.w/2, y - it.h/2, it.w, it.h, 14, true, false);
      }

      // focus outline
      if (focusId === it.id) {
        ctx.strokeStyle = 'rgba(255,255,255,0.24)';
        ctx.lineWidth = 3;
        roundRect(x - it.w/2 - 6, y - it.h/2 - 6, it.w + 12, it.h + 12, 16, false, true);
      }

      // popup clue only
      if (it.clueT > 0) {
        const a = clamp(it.clueT / cfg.clueWindow, 0, 1);
        drawClue(x, y - it.h/2 - 12, it.taskLabel.toUpperCase(), a);
      }

      // safety: keep inside belt visually
      if (y - it.h/2 < beltTop - 40 || y + it.h/2 > beltBottom + 40) {
        // not a big deal, but you asked for no glitches: clamp bob slightly
        it.yBob = clamp(it.yBob, -10, 10);
      }
    }
  }

  function drawToast(L) {
    if (toast.t <= 0) return;
    const a = clamp(toast.t / 0.95, 0, 1);
    ctx.globalAlpha = 0.18 + a*0.82;

    const text = toast.text || '';
    ctx.font = '950 16px system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial';
    const tw = ctx.measureText(text).width;
    const bx = L.w/2 - tw/2 - 16;
    const by = Math.max(70, Math.floor(L.h*0.14));
    const bw = tw + 32;
    const bh = 40;

    ctx.fillStyle = 'rgba(10,12,18,0.68)';
    roundRect(bx, by, bw, bh, 14, true, false);

    const col = toast.kind === 'ok' ? 'rgba(170,255,200,0.95)'
             : toast.kind === 'bad' ? 'rgba(255,130,150,0.95)'
             : toast.kind === 'warn' ? 'rgba(255,220,140,0.95)'
             : 'rgba(245,245,255,0.92)';
    ctx.fillStyle = col;
    ctx.textAlign = 'center';
    ctx.fillText(text, L.w/2, by + 26);

    ctx.globalAlpha = 1;
  }

  function draw() {
    const L = layout(cfg);

    drawBackground(L);
    drawBelt(L);
    drawGate(L);
    drawItems(L);
    drawToast(L);

    // Minimal topbar (no tasks, no rules)
    topbar.textContent =
      `L${level}/100  ·  ${Math.floor(score)}  ·  ❤ ${lives}  ·  x${mult.toFixed(1)}  ·  ${cleared}/${goal}`;
  }

  // ---------- Main loop ----------
  function frame(t) {
    if (!tPrev) tPrev = t;
    const dt = clamp((t - tPrev) / 1000, 0, 0.033);
    tPrev = t;

    if (state === 'running') update(dt);
    draw();
    requestAnimationFrame(frame);
  }

  // ---------- Boot ----------
  function boot() {
    state = 'loading';
    topbar.textContent = 'Loading…';

    showOverlay(`
      <h1>Loading assets…</h1>
      <p class="muted">Make sure <b>receipt_run_assets/</b> sits next to this HTML file.</p>
      <div class="row">
        <div class="pill warn">If you see boxes instead of products, an image path is wrong.</div>
      </div>
    `);

    loadImages().then(() => {
      hideOverlay();
      rebuildButtons();
      showMenu();
      requestAnimationFrame(frame);
    });
  }

  boot();
})();
</script>
</body>
</html>
